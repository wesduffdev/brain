# How the being's dominant emotion is DERIVED from its needs.
# Rules are evaluated top to bottom; the first whose condition holds wins.
# Only one emotion is dominant at a time. Tuning the thresholds here changes
# temperament without touching Python.
#
# These are the emotions a being can reach from internal state alone.
# Interaction-driven emotions (happy, excited, comforted) arrive with the
# object/interaction slice — they need an event, not just a need level.
#
# `scared` is fear. Its trigger below (low safety) now fires: the environment
# slice (ADR 0006) lets a dark or loud room push the contextual safety need down
# over ticks until it crosses this threshold. Retuning the threshold is a config
# change here — no code moves.

rules:
  - { emotion: scared,     need: safety,    op: "<=", value: 30 }
  - { emotion: hungry,     need: hunger,    op: ">=", value: 80 }
  - { emotion: sleepy,     need: sleep,     op: ">=", value: 80 }
  - { emotion: frustrated, need: comfort,   op: "<=", value: 25 }
  - { emotion: curious,    need: curiosity, op: ">=", value: 70 }

default: calm
