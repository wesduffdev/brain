# The instinct model's frozen input/output contract and training tuning (ADR 0026).
#
# The instinct layer is the being's SECOND neural network (event-instinct wave):
# a tiny net that maps fast-sensory/kinematic stimulus features to pre-conceptual
# protective REACTIONS. Unlike the outcome predictor's multi-hot categorical
# vector, every input slot here is a single continuous, normalized scalar. This
# file is the single source of truth for:
#
#   - `feature_order` : the 14 stimulus features, IN ORDER — the frozen encode
#                       contract the InstinctFeatureEncoder reproduces and the
#                       artifact carries (reordering/inserting one is a contract
#                       change → retrain; a drifted artifact is rejected on load).
#   - `labels`        : the 5 reactions the model predicts (its output slots),
#                       independent sigmoid probabilities (multi-label, not
#                       softmax) — a stimulus can score high on several at once.
#   - `training`      : trainer hyperparameters (config-driven tuning — the
#                       trainer reads these, never hard-codes them).
#
# The model also emits one scalar `reaction_intensity` in [0, 1] (a separate
# regression head), so no label slot is needed for it.

feature_order:
  - distance
  - velocity
  - acceleration
  - trajectory_toward_body
  - time_to_contact
  - object_size
  - size_change_rate
  - unexpectedness
  - visibility_confidence
  - sound_spike_intensity
  - touch_intensity
  - current_focus_level
  - current_stability
  - prior_prediction_error

labels:
  - flinch
  - freeze
  - orient
  - withdraw
  - ignore

# Trainer tuning. Retuning training is a config change, not a code change.
#   intensity_loss : how the scalar reaction_intensity head is trained —
#                    "bce" (BCEWithLogits on the [0,1] target, the default) or
#                    "mse" (mean-squared error on the sigmoid-activated output).
training:
  epochs: 400
  hidden_size: 16
  learning_rate: 0.05
  seed: 0
  intensity_loss: bce

# RUNTIME wiring (RUNTIME-WIRE): whether the DEPLOYED engine (main.py / bootstrap)
# constructs a shared EventBus and drives the perception -> instinct -> reaction
# chain LIVE each tick. Default ON: the chain runs in SHADOW (the `reaction.shadow`
# / `visual_only` / `allow_interrupt` gates below still govern behavior, all set to
# the byte-identical prior default), and it is None-safe -- with no torch or no
# trained `models/instinct.pt` the predictor is None and the chain stays inert, so
# a lean runtime is byte-identical. The broker is chosen by the environment
# (InMemoryEventBus by default; KafkaEventBus when KAFKA_BOOTSTRAP_SERVERS is set,
# ADR 0024) -- never authored here. Set `enabled: false` to keep instinct out of
# the runtime entirely. Retuning is a config change only.
runtime:
  enabled: true
  # How the DEPLOYED runtime PULLS pending events off the bus each tick when it is
  # broker-backed (Kafka). Inert on the in-memory default (delivery is synchronous
  # on publish). Each tick the runtime polls a BOUNDED batch on the tick thread — a
  # background consumer would race the single writer — so the perception -> instinct
  # -> reaction chain advances within the tick, mirroring in-memory (KAFKA-RUNTIME-LOOP,
  # ADR 0024). Kept small so an idle tick is not stalled; the chain self-heals over
  # ticks (offsets committed only after handling, `earliest` reset). Retuning the poll
  # cadence is a config change only.
  consume:
    max_messages: 16          # events one tick may pull at most
    poll_timeout_seconds: 0.2 # how long each poll waits for a message

# Reaction SELECTION — the instinct CONSUMER's concern (INS-RT, extends ADR 0011),
# read into a typed InstinctRuntimePolicy. The model only predicts; it never
# selects an action and never bypasses the safety floor. Selection turns a
# per-stimulus prediction into one protective reaction:
#   - `thresholds` : per label, the probability at or above which that reaction may
#                    fire (a label with no threshold can never fire). `ignore` has
#                    none — it is the explicit no-reaction outcome.
#   - `cooldowns`  : per label, how many TICKS must elapse after a reaction fires
#                    before it may fire again, so one approach stream cannot
#                    machine-gun the same reaction.
#   - `shadow`     : the record-only gate. ON (the default) the consumer persists
#                    and publishes its prediction/reaction but changes NO simulation
#                    behavior; flipping it False (active integration) is INS-ACT's,
#                    not INS-RT's. Retuning any of this is a config change only.
reaction:
  shadow: true
  thresholds:
    flinch: 0.5
    freeze: 0.5
    orient: 0.4
    withdraw: 0.6
  cooldowns:
    flinch: 5
    freeze: 5
    orient: 3
    withdraw: 8
  # ACTIVE-instinct integration (INS-ACT, ADR 0029), staged behind two flags that
  # BOTH default to the prior (byte-identical) behavior — activation is a config
  # flip, never code. A triggered reaction proposes; the SafetyService floor always
  # disposes (never bypassed).
  #   visual_only     : step 1 — SURFACE the reaction in the being's state (the
  #                     render `reaction` field) and BIAS the being's DERIVED
  #                     emotion (via `emotion_bias`, fed into needs->emotion
  #                     derivation — never assigned). No action interruption.
  #   allow_interrupt : step 2 — a reaction at/above `interrupt.intensity_threshold`
  #                     may CANCEL an interruptible current action, but only when the
  #                     floor permits the protective response; otherwise SUPPRESSED.
  visual_only: true       # VISUAL-ON: surface + bias emotion (active)
  allow_interrupt: true   # INTERRUPT-ON: a strong reaction may CANCEL a safe,
                          # interruptible action (the first behaviour change);
                          # the SafetyService floor still disposes, never bypassed.
  # The TRANSIENT affect a triggered reaction feeds into emotion derivation, per
  # label (`need: delta`). A flinch drops the felt safety used for derivation below
  # the `scared` threshold, so the being reads as afraid — the stored needs are left
  # untouched. Retuning how a reaction colours emotion is a change here only.
  emotion_bias:
    flinch:   { safety: -60 }
    freeze:   { safety: -40 }
    withdraw: { safety: -50 }
    orient:   { safety: -20 }
  # ADAPTIVE temperament (INS-TEMPERAMENT, ADR 0031): the being's EFFECTIVE reaction
  # thresholds DRIFT from experience, so identical stimuli provoke different reactions
  # as it learns — the fast-layer sibling of the v6 slow trait drift (config/traits.yaml).
  #   habituate_rate : per HARMLESS startle (the being's `pain` did not rise), how far
  #                    that label's threshold rises toward `ceiling` — a repeated harmless
  #                    startle gradually STOPS firing (less reactive). Slow, like caution.
  #   sensitize_rate : per HARMFUL outcome (the being's `pain` spiked), how far EVERY
  #                    threshold falls toward `floor` — the being gets jumpier, a
  #                    previously sub-threshold stimulus may now fire (more reactive).
  #   floor/ceiling  : the bounds of the effective threshold in PROBABILITY space. These
  #                    are NOT the SafetyService invariant floor — temperament only ever
  #                    reshapes which REACTION fires, never whether an action is allowed.
  # Both rates 0 => no drift => the static thresholds above (byte-identical). Harm both
  # sensitizes here AND lifts the caution trait (config/traits.yaml): the two reinforce
  # across layers (reaction gating vs. decision bias) without double-counting.
  temperament:
    habituate_rate: 0.04
    sensitize_rate: 0.15
    floor: 0.05
    ceiling: 0.98
  interrupt:
    intensity_threshold: 0.7          # a reaction must be this intense to interrupt
    interruptible_actions: [observe, approach, touch, grab, push]
    protective_action: withdraw       # the response the floor is asked to permit
