# The self-report / narration language layer (S1, ADR 0032; extends ADR 0022).
#
# The being reports its own experience in plain first-person language, grounded
# ONLY in its logged memories. This file tunes that voice — which narrator backs
# the shared LanguageModelPort, how far back a report looks, and the WORD CHOICES
# it renders with. Retuning the voice is a change HERE, never in Python (the
# config-driven-tuning rule). Only ConfigService reads this file.

# Which voice sits behind the LanguageModelPort seam.
#   deterministic -> the offline template narrator (fully offline, no key); default
#   model         -> a real LLM (Claude), env-gated on ANTHROPIC_API_KEY (S2)
narrator:
  kind: deterministic

report:
  # How many of the most-recent memories a "what have you done recently?" report
  # covers, in the order they were lived.
  recent_count: 5
  # A memory at or above this salience (priority) has its felt affect emphasized
  # ("afterwards I felt VERY scared") — surprise/emotion make a moment stand out.
  salience_emphasis_threshold: 1.0

# How a structured memory/state fact is rendered into prose. The vocabulary lives
# here, not in the narrator; an unmapped token falls back to itself, so the being
# still speaks (grounded, if terse) before a word is authored.
phrasing:
  # action -> its past-tense verb
  action_past:
    observe: looked at
    approach: moved toward
    withdraw: backed away from
    touch: touched
    push: pushed
    grab: grabbed
    drop: dropped
  # observed outcome label -> a plain first-person clause
  outcome_clause:
    rolls: it rolled
    bounces: it bounced
    falls: it fell
    causes_pain: it hurt me
    makes_noise: it made a noise
    pleasant: it felt nice
    scary: it frightened me
  # derived emotion -> the feeling word the being names
  feeling:
    calm: calm
    scared: scared
    curious: curious
    hungry: hungry
    sleepy: sleepy
    frustrated: frustrated
    happy: happy
    excited: excited
    comforted: comforted
