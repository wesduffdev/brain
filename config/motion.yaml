# How perceived object MOTION becomes the being's approach STIMULUS (ADR 0027).
# This is world-truth (where objects are and how they move) plus the tuning that
# normalizes raw kinematics into the frozen 14-feature instinct vector (ADR 0026).
# The being never reads this directly — the StimulusService turns it into a
# *perceived* approach stimulus published on `being.perception.events`. Change
# values here, never in service code.
#
# Positions/velocities are in abstract world units, measured relative to the
# being's body at the origin (0,0); velocity is per tick. `size` is an abstract
# extent that drives the looming (apparent-size) signal.

# normalization: a raw quantity at its max reads as 1.0 in the feature vector.
normalization:
  max_distance: 10.0          # distance / max_distance -> [0,1]
  max_speed: 5.0              # speed / max_speed -> [0,1]
  max_acceleration: 5.0       # signed rate -> [-1,1]
  max_time_to_contact: 10.0   # ticks-to-contact / max -> [0,1] (small = imminent)
  max_size: 1.0
  max_size_change_rate: 1.0   # looming, signed rate -> [-1,1]

# approach: the gate on what counts as an approach worth a stimulus. An object
# closing on the body faster than this raises `ObjectApproached`; anything slower,
# static, or receding raises none.
approach:
  min_closing_speed: 0.0

# perception (TICK-EVENT-MIGRATE, ADR 0024/0025): how the perceived-room FRAME reaches
# the sensory-stimulus subsystem each tick. Off (the default) keeps the pre-migration
# inline call (Simulation -> StimulusService.observe). On -- and only when an event bus
# is wired -- the frame is PUBLISHED as a `being.perception.taken` event the
# StimulusService consumes, migrating that seam onto the backbone. The two routes are
# proven byte-identical; flip this to route via the bus. Retuning is a config change only.
perception:
  route_via_events: false

# sensory_defaults: the features still without a world source — the being's
# fast-loop internal state, folded in later by the instinct consumer, not here.
# (`sound_spike_intensity` and `touch_intensity` ARE sourced now — see `sound:`
# and `contact:` below — but keep their 0.0 default here for the motion-approach
# stimulus, which carries neither.) Each defaults to 0.0 until a slice supplies it.
sensory_defaults:
  unexpectedness: 0.0
  sound_spike_intensity: 0.0
  touch_intensity: 0.0
  current_focus_level: 0.0
  current_stability: 0.0
  prior_prediction_error: 0.0

# sound (SENSORY-STIM): a SUDDEN transition into one of these sound categories
# (via change_environment) is a startle the being HEARS but cannot see. It raises
# a `being.perception.sound_spike` stimulus carrying these sensory features into
# the frozen instinct vector, so the instinct model can FREEZE (a loud/unknown
# sound reads as intense, unexpected, and unseen — ADR 0026's freeze archetype).
# A category not listed here raises no spike; holding a category is not a fresh
# spike each tick (only the onset is sudden). The same categories carry a safety
# push in environment.yaml — that is the slow contextual need, this is the fast
# instinct startle; two distinct concerns.
#   sound_spike_intensity : how strong the heard spike is (feature idx 9)
#   unexpectedness        : how novel/unpredictable the sound is (idx 7)
#   visibility_confidence : deliberately LOW — a sound has no visible source (idx 8)
sound:
  spike:
    loud:          { sound_spike_intensity: 0.80, unexpectedness: 0.70, visibility_confidence: 0.20 }
    unknown_sound: { sound_spike_intensity: 0.95, unexpectedness: 0.90, visibility_confidence: 0.10 }

# contact (SENSORY-STIM): when an approaching object CROSSES into the body (its
# distance falls to/within contact_distance, in the same abstract world units as
# positions), that contact raises a `being.perception.object_contacted` stimulus
# carrying a real `touch_intensity` (+ the unexpectedness that makes an unforeseen
# touch a startle), so the instinct model can WITHDRAW (ADR 0026's withdraw
# archetype). touch_intensity scales with the impact speed (speed / max_speed) but
# is floored at min_touch_intensity so any real contact is felt.
contact:
  contact_distance: 0.5
  min_touch_intensity: 0.60
  unexpectedness: 0.70

# objects: the world's starting kinematics, per catalogued object id. The ball and
# the hot lamp are being moved toward the being (an approach the being can feel);
# the blanket drifts in slowly; the block sits still (no stimulus).
objects:
  obj_red_ball:     { position: [8.0, 0.0], velocity: [-4.0, 0.0], size: 0.3 }
  obj_soft_blanket: { position: [6.0, 1.0], velocity: [-0.5, 0.0], size: 0.5 }
  obj_wooden_block: { position: [5.0, 0.0], velocity: [ 0.0, 0.0], size: 0.6 }
  obj_hot_lamp:     { position: [7.0, 0.0], velocity: [-3.0, 0.0], size: 0.4 }
