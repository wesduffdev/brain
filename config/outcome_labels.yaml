# The outcome predictor's vocabulary and training tuning (ADR 0008).
#
# The first neural network (BRIEF §11) is a MULTI-LABEL model: one action on one
# object can produce several outcomes at once (drop a rubber ball -> falls +
# bounces + rolls). This file is the single source of truth for:
#
#   - `labels`            : the outcomes the model predicts (its output slots)
#   - `context_features`  : the situational feature block appended to an object's
#                           properties + action when encoding an interaction
#   - `training`          : trainer hyperparameters (config-driven tuning — the
#                           trainer reads these, never hard-codes them)
#
# The full feature vector is: object `properties` ++ `affordances` (both from
# object_properties.yaml) ++ the `context_features` below. Its exact order is the
# encode contract V0-9 must reproduce to run the model in shadow mode (ADR 0008).

labels:
  - rolls
  - bounces
  - falls
  - causes_pain
  - makes_noise
  - pleasant
  - scary

# Situational context an outcome can depend on. Kept minimal for the v0 scaffold:
# the surface an object meets when acted on (a hard floor makes a drop bounce and
# a shove loud; a soft one muffles both). One is set per interaction.
context_features:
  - surface_hard
  - surface_soft

# Trainer tuning. Retuning training is a config change, not a code change.
training:
  epochs: 300
  hidden_size: 16
  learning_rate: 0.05
  seed: 0

# Inference + blend tuning (ADR 0011, extended by card v3).
#
# `threshold` is the probability at or above which the model counts an outcome as
# predicted when comparing against the actual outcome (shadow-mode sensitivity).
#
# The rest govern ACTIVE prediction — when the blended prediction shapes the
# being's decision (BRIEF §12, v2), not just records:
#   neural_enabled              : the shadow -> active flip. false (default) keeps
#                                 prediction observational; true lets the blended
#                                 prediction penalize actions it predicts will
#                                 hurt (within the safety floor).
#   neural_weight / rule_weight : how the neural and rule-based predictors' outcome
#                                 probabilities are blended (a weighted sum).
#   fallback_to_rules_on_error  : on a neural inference failure, fall back to the
#                                 rule layer so the sim keeps running (true), or
#                                 propagate the error (false).
# Retuning the blend — or turning the model off — is a config change, never code.
prediction:
  threshold: 0.5
  neural_enabled: false
  neural_weight: 0.5
  rule_weight: 0.5
  fallback_to_rules_on_error: true
