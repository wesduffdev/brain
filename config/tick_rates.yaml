# The tuning surface for time. Change values here — never in service code.
# This is the whole point of the config-driven design: fine-tuning drift never
# touches Python.
#
# direction:
#   increase   -> the need drifts up on its own (a deficit growing)
#   decrease   -> the need drifts down on its own (a good state fading)
#   contextual -> no autonomous drift; a later slice's environment/perception
#                 moves it (e.g. safety falls when the room goes dark or loud)
# amount / every_ticks : apply `amount` when tick % every_ticks == 0
# min / max            : the value is clamped to this band
# start                : the value a fresh being is born with

tick:
  duration_ms: 1000

needs:
  hunger:    { direction: increase,   amount: 1, every_ticks: 30, min: 0, max: 100, start: 30 }
  sleep:     { direction: increase,   amount: 1, every_ticks: 45, min: 0, max: 100, start: 35 }
  comfort:   { direction: decrease,   amount: 1, every_ticks: 20, min: 0, max: 100, start: 70 }
  warmth:    { direction: contextual, amount: 1, every_ticks: 30, min: 0, max: 100, start: 20 }
  curiosity: { direction: increase,   amount: 1, every_ticks: 15, min: 0, max: 100, start: 55 }
  safety:    { direction: contextual, amount: 1, every_ticks: 10, min: 0, max: 100, start: 80 }

# Action TIMING lives here — tick_rates.yaml is the single tuning surface for
# time (BRIEF §10), and the decision system (ADR 0009) reads these. What each
# action IS and how much the being wants it (utility) lives in actions.yaml.
#   duration_ticks : how long the action occupies the being once taken
#   cooldown_ticks : the rest after it before that action may be taken again
# An action is available again at (tick_taken + duration_ticks + cooldown_ticks).
# Keep exploratory actions cheap to repeat; make touching/holding rest longer.
actions:
  observe:  { duration_ticks: 0, cooldown_ticks: 2 }
  approach: { duration_ticks: 0, cooldown_ticks: 3 }
  withdraw: { duration_ticks: 0, cooldown_ticks: 1 }
  touch:    { duration_ticks: 0, cooldown_ticks: 5 }
  grab:     { duration_ticks: 0, cooldown_ticks: 5 }
  push:     { duration_ticks: 0, cooldown_ticks: 4 }
