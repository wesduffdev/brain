# Docker Compose skeleton for the situated-being simulation (ticket V0-5).
# BRIEF §6 is the reference shape. Services: the Python `engine`, `postgres`, the
# PixiJS `renderer` (V0-11), and the `ml-trainer` job (V0-8) under
# `profiles: [training]`.

services:
  engine:
    build: ./engine
    # Serves the FastAPI REST /state + WebSocket tick stream (V0-6). Wired at the
    # wave/1 roll-up now that app.main exists (V0-5 shipped the skeleton running
    # the demo; this is the promised switch).
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./engine:/app
      - ./config:/config
      - ./models:/models
    environment:
      CONFIG_ROOT: /config
      DATABASE_URL: postgresql+psycopg://sim:sim@postgres:5432/being_sim
      MODEL_PATH: /models/outcome_predictor.pt
      # API auth (V0-SEC, ADR 0005). Values are interpolated from your shell or
      # the project-root `.env` (see `.env.example`) — a real secret is never
      # committed. JWT_SECRET is required; the rest fall back to their defaults.
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      JWT_ISSUER: ${JWT_ISSUER:-jarvis}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-jarvis-engine}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-3600}
      # Event backbone broker (EVT-KAFKA, ADR 0024). Compose-internal listener;
      # the broker starts only under the `events` profile (see the kafka service).
      # Nothing consumes it yet — wired when the sim moves onto the bus (INS-RT).
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
      # Model-service sidecar (v8, ADR 0043). Endpoint is deploy config, like
      # DATABASE_URL; routing/flags live in config/models.yaml (default:
      # inprocess, so nothing calls out unless a model is routed `http`). The
      # sidecar starts only under the `models` profile (see model-service).
      MODEL_SERVICE_URL: ${MODEL_SERVICE_URL:-http://model-service:8500}
    depends_on:
      postgres:
        condition: service_healthy

  renderer:
    # The PixiJS front-end (V0-11, BRIEF §6). Vite dev server; the source is
    # bind-mounted for live edits with an anonymous volume shielding
    # node_modules. It draws render frames (ADR 0004) and forwards player
    # commands — it owns no psychology (architectural rule #1).
    build: ./renderer
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    environment:
      # The browser runs on the host, so it reaches the engine at localhost:8000
      # (the published port), not the compose-internal `engine` hostname.
      VITE_ENGINE_HOST: ${VITE_ENGINE_HOST:-localhost:8000}
      # v0 has no login (ADR 0010): mint a service token with `make token` and
      # set RENDERER_TOKEN in your .env. Empty means the engine (AUTH_REQUIRED)
      # will reject the handshake — expected until you provide one.
      VITE_ENGINE_TOKEN: ${RENDERER_TOKEN:-}
    volumes:
      - ./renderer:/app
      - /app/node_modules
    depends_on:
      - engine

  ml-trainer:
    # The PyTorch training sidecar/job (BRIEF §5, §11). Reuses the lean engine
    # image, then installs the training-only deps (torch/numpy) on top — kept out
    # of the runtime image so `engine` stays small. Run on demand:
    #   docker compose --profile training run ml-trainer   (or: make train)
    # V0-8 trains on a synthetic seed set derived from the config vocab, so it
    # needs no database: there is deliberately no depends_on postgres here. Once
    # persistence + event wiring land (V0-6/V0-7) it will prefer stored
    # training_examples.
    build: ./engine
    command:
      - sh
      - -c
      - "pip install --no-cache-dir -r requirements-train.txt && python -m app.ml.train_outcome_model"
    volumes:
      - ./engine:/app
      - ./config:/config
      - ./models:/models
    environment:
      CONFIG_ROOT: /config
      MODEL_OUTPUT_PATH: /models/outcome_predictor.pt
    profiles:
      - training

  kafka:
    # Event backbone broker (EVT-KAFKA, ADR 0024). KRaft mode — a single combined
    # broker+controller node, no ZooKeeper. Two listeners: INTERNAL (kafka:9094)
    # for compose services, EXTERNAL (localhost:9092) for host clients — the
    # [kafka] integration test and `make kafka-init`. Gated behind the `events`
    # profile so the default stack (engine + postgres) is byte-for-byte unchanged;
    # `make kafka-up` or `docker compose --profile events up` brings it online.
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:9094,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9094,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Single broker, single being: everything replicates x1, no rebalance delay.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      # Broker answers an API-versions request on its own internal listener.
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9094 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 15
    profiles:
      - events

  kafka-init:
    # Topic-bootstrap step (EVT-KAFKA): creates the being.* topics + their .dlq
    # companions from config/events.yaml, then exits. Reuses the lean engine image
    # (confluent-kafka is already in its requirements) exactly as ml-trainer does,
    # so topic NAMES stay config-sourced rather than duplicated in compose YAML.
    # One-shot: it runs to completion after the broker is healthy and does not
    # restart. `make kafka-up` runs the same step from the host venv instead.
    build: ./engine
    command: ["python", "-m", "app.kafka_bootstrap"]
    environment:
      CONFIG_ROOT: /config
      KAFKA_BOOTSTRAP_SERVERS: kafka:9094
    volumes:
      - ./engine:/app
      - ./config:/config
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    profiles:
      - events

  model-service:
    # Model-inference sidecar (v8, ADR 0043): serves the outcome + instinct models
    # OUT-OF-PROCESS over HTTP (/predict/outcome, /predict/instinct, /health,
    # /models/active) so torch stays out of the lean engine image. Gated behind the
    # `models` profile so the default stack (engine + postgres) is byte-for-byte
    # unchanged; `docker compose --profile models up` brings it online, and the
    # engine only calls it when config/models.yaml routes a model to `http`.
    # Built from the repo root so the image can copy the engine `app` package.
    build:
      context: .
      dockerfile: model-service/Dockerfile
    command: uvicorn service:app --host 0.0.0.0 --port 8500
    ports:
      - "8500:8500"
    volumes:
      - ./config:/config
      - ./models:/models
    environment:
      CONFIG_ROOT: /config
      MODEL_PATH: /models/outcome_predictor.pt
      INSTINCT_MODEL_PATH: /models/instinct.pt
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8500/health').status==200 else 1)\" || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 15
    profiles:
      - models

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sim
      POSTGRES_PASSWORD: sim
      POSTGRES_DB: being_sim
    ports:
      - "5432:5432"
    volumes:
      - being_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sim -d being_sim"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  being_postgres_data:
