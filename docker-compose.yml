# Docker Compose skeleton for the situated-being simulation (ticket V0-5).
# BRIEF §6 is the reference shape. Services: the Python `engine`, `postgres`, the
# PixiJS `renderer` (V0-11), and the `ml-trainer` job (V0-8) under
# `profiles: [training]`.

services:
  engine:
    build: ./engine
    # Serves the FastAPI REST /state + WebSocket tick stream (V0-6). Wired at the
    # wave/1 roll-up now that app.main exists (V0-5 shipped the skeleton running
    # the demo; this is the promised switch).
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./engine:/app
      - ./config:/config
      - ./models:/models
    environment:
      CONFIG_ROOT: /config
      DATABASE_URL: postgresql+psycopg://sim:sim@postgres:5432/being_sim
      MODEL_PATH: /models/outcome_predictor.pt
      # API auth (V0-SEC, ADR 0005). Values are interpolated from your shell or
      # the project-root `.env` (see `.env.example`) — a real secret is never
      # committed. JWT_SECRET is required; the rest fall back to their defaults.
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (see .env.example)}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      JWT_ISSUER: ${JWT_ISSUER:-jarvis}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-jarvis-engine}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-3600}
    depends_on:
      postgres:
        condition: service_healthy

  renderer:
    # The PixiJS front-end (V0-11, BRIEF §6). Vite dev server; the source is
    # bind-mounted for live edits with an anonymous volume shielding
    # node_modules. It draws render frames (ADR 0004) and forwards player
    # commands — it owns no psychology (architectural rule #1).
    build: ./renderer
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    environment:
      # The browser runs on the host, so it reaches the engine at localhost:8000
      # (the published port), not the compose-internal `engine` hostname.
      VITE_ENGINE_HOST: ${VITE_ENGINE_HOST:-localhost:8000}
      # v0 has no login (ADR 0010): mint a service token with `make token` and
      # set RENDERER_TOKEN in your .env. Empty means the engine (AUTH_REQUIRED)
      # will reject the handshake — expected until you provide one.
      VITE_ENGINE_TOKEN: ${RENDERER_TOKEN:-}
    volumes:
      - ./renderer:/app
      - /app/node_modules
    depends_on:
      - engine

  ml-trainer:
    # The PyTorch training sidecar/job (BRIEF §5, §11). Reuses the lean engine
    # image, then installs the training-only deps (torch/numpy) on top — kept out
    # of the runtime image so `engine` stays small. Run on demand:
    #   docker compose --profile training run ml-trainer   (or: make train)
    # V0-8 trains on a synthetic seed set derived from the config vocab, so it
    # needs no database: there is deliberately no depends_on postgres here. Once
    # persistence + event wiring land (V0-6/V0-7) it will prefer stored
    # training_examples.
    build: ./engine
    command:
      - sh
      - -c
      - "pip install --no-cache-dir -r requirements-train.txt && python -m app.ml.train_outcome_model"
    volumes:
      - ./engine:/app
      - ./config:/config
      - ./models:/models
    environment:
      CONFIG_ROOT: /config
      MODEL_OUTPUT_PATH: /models/outcome_predictor.pt
    profiles:
      - training

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sim
      POSTGRES_PASSWORD: sim
      POSTGRES_DB: being_sim
    ports:
      - "5432:5432"
    volumes:
      - being_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sim -d being_sim"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  being_postgres_data:
